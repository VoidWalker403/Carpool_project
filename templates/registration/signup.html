{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Sign Up - Carpool</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:'Orbitron', sans-serif;

    background-image: url("{% static 'images/signup_bg.jpg' %}");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
}

.signup-container{

    width:420px;
    padding:35px;

    border-radius:18px;

    background:rgba(0,0,0,0.65);
    backdrop-filter:blur(10px);

    box-shadow:0 0 30px rgba(0,255,255,0.3);

    color:white;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

label{
    font-size:14px;
}

input{

    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:15px;

    border-radius:8px;
    border:none;

    background:#111;
    color:white;
}

input:focus{
    outline:none;
    box-shadow:0 0 5px cyan;
}

button{

    width:100%;
    padding:12px;

    border:none;
    border-radius:8px;

    background:linear-gradient(90deg,#00eaff,#ff00ff);

    font-weight:bold;
    font-size:15px;

    cursor:pointer;
}

button:hover{
    transform:scale(1.05);
}

.login-link{
    text-align:center;
    margin-top:15px;
}

a{
    color:#00eaff;
    text-decoration:none;
}

</style>

</head>

<body>

<div class="signup-container">

<h1>Create Account</h1>

<form method="post">

{% csrf_token %}

<label>Username</label>
{{ form.username }}

<label>Email</label>
{{ form.email }}

<label>Password</label>
{{ form.password1 }}

<label>Confirm Password</label>
{{ form.password2 }}

<button type="submit">Sign Up</button>

</form>

<div class="login-link">
Already have an account? <a href="/login/">Login</a>
</div>

</div>

</body>
</html>
