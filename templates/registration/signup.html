{% load static %}
<!DOCTYPE html>
<html>
<head>
<title>Sign Up</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
padding:0;
height:100vh;
font-family:'Orbitron',sans-serif;
background:url("{% static 'images/signup_bg.jpg' %}") no-repeat center center/cover;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:rgba(0,0,0,0.75);
padding:40px;
border-radius:15px;
box-shadow:0 0 20px cyan;
width:380px;
text-align:center;
color:white;
}

h1{
color:cyan;
margin-bottom:20px;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:5px;
background:#111;
color:white;
font-size:14px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:cyan;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#00ffff;
box-shadow:0 0 10px cyan;
}

.role-box{
margin:15px 0;
text-align:left;
}

a{
color:cyan;
text-decoration:none;
}

</style>

</head>

<body>

<div class="container">

<h1>Create Account</h1>

<form method="post">
{% csrf_token %}

<input type="text" name="username" placeholder="Username" required>

<input type="email" name="email" placeholder="Email" required>

<input type="password" name="password1" placeholder="Password" required>

<input type="password" name="password2" placeholder="Confirm Password" required>

<div class="role-box">
<label>Select Role</label><br>

<input type="radio" name="role" value="Passengers" checked> Passenger (Find rides)<br>

<input type="radio" name="role" value="Drivers"> Driver (Offer rides)

</div>

<button type="submit">Create Account</button>
{% if form.errors %}
  <div style="text-align:left; color:#ff7bd5; font-size:12px; margin-bottom:10px;">
    {{ form.errors }}
  </div>
{% endif %}

</form>

<p style="margin-top:15px;">
Already have an account?
<a href="/login/">Login</a>
</p>

</div>

</body>
</html>
