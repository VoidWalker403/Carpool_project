{% load static %}
<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign up</title>
  <style>
    body{font-family:system-ui;display:grid;place-items:center;min-height:100vh;background:#0b1020;color:#fff}
    .card{width:min(420px,92vw);padding:24px;border:1px solid rgba(255,255,255,.15);border-radius:16px;background:rgba(255,255,255,.06)}
    input{width:100%;padding:10px;border-radius:10px;border:1px solid rgba(255,255,255,.2);background:#0f1730;color:#fff}
    button{width:100%;margin-top:12px;padding:12px;border:0;border-radius:10px;background:#22d3ee;font-weight:700}
    a{color:#22d3ee}
    .err{background:rgba(255,0,80,.15);border:1px solid rgba(255,0,80,.35);padding:10px;border-radius:10px;margin-bottom:12px}
    label{display:block;margin:10px 0 6px}
  </style>
</head>
<body>
  <div class="card">
    <h2>Create account</h2>

    {% if form.errors %}
      <div class="err">Please fix the errors below.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}

      <label>Username</label>
      {{ form.username }}

      <label>Email (optional)</label>
      {{ form.email }}

      <label>Password</label>
      {{ form.password1 }}

      <label>Confirm password</label>
      {{ form.password2 }}

      <button type="submit">Sign up</button>
    </form>

    <p style="margin-top:12px">
      Already have an account? <a href="/login/">Log in</a>
    </p>
  </div>
</body>
</html>
