{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login • Carpool</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">

  <style>
    :root{
      --text:#eaf0ff;
      --muted: rgba(234,240,255,.72);
      --neon1:#7c5cff;
      --neon2:#22d3ee;
      --neon3:#ff2bd6;
      --stroke: rgba(255,255,255,.14);
    }
    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      display:grid;
      place-items:center;
      font-family: "Orbitron", system-ui, sans-serif;
      color: var(--text);

      background:
        radial-gradient(1200px 700px at 20% 20%, rgba(124,92,255,.20), transparent 60%),
        radial-gradient(1000px 600px at 80% 30%, rgba(34,211,238,.14), transparent 55%),
        linear-gradient(rgba(0,0,0,.72), rgba(0,0,0,.72)),
        url("{% static 'images/porsche.jpg' %}");

      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      overflow:hidden;
    }

    .headlight-glow{
      position: fixed;
      inset: 0;
      pointer-events:none;
      background:
        radial-gradient(420px 220px at 58% 62%, rgba(255,255,255,.12), transparent 70%),
        radial-gradient(520px 260px at 62% 62%, rgba(34,211,238,.18), transparent 75%),
        radial-gradient(560px 280px at 45% 62%, rgba(124,92,255,.14), transparent 80%);
      mix-blend-mode: screen;
      opacity: .95;
    }

    .card{
      width: min(520px, 92vw);
      border: 1px solid var(--stroke);
      border-radius: 22px;
      background: rgba(10, 12, 24, .62);
      backdrop-filter: blur(14px);
      box-shadow: 0 30px 90px rgba(0,0,0,.65);
      padding: 34px 30px;
      position: relative;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:10px;
      padding:10px 14px;
      border-radius:999px;
      border:1px solid var(--stroke);
      background: rgba(0,0,0,.16);
      font-size:12px;
      letter-spacing:1px;
      text-transform:uppercase;
      margin-bottom:14px;
    }
    .dot{
      width:10px;height:10px;border-radius:999px;
      background: radial-gradient(circle at 30% 30%, #fff, var(--neon2));
      box-shadow: 0 0 14px var(--neon2);
    }

    h1{
      margin: 0 0 6px;
      font-size: 26px;
      letter-spacing: 1px;
    }
    .hint{
      margin: 0 0 18px;
      color: var(--muted);
      font-family: system-ui, sans-serif;
      letter-spacing: .2px;
      font-size: 13px;
      line-height: 1.4;
    }

    label{
      display:block;
      font-size:11px;
      letter-spacing:1px;
      text-transform:uppercase;
      color: rgba(234,240,255,.78);
      margin: 12px 0 8px;
    }

    .input{
      width:100%;
      padding:14px 14px;
      border-radius: 14px;
      border: 1px solid var(--stroke);
      background: rgba(5,6,11,.55);
      color: var(--text);
      outline:none;
      font-size: 14px;
      letter-spacing: .4px;
      transition: box-shadow .12s ease, transform .12s ease, border-color .12s ease;
    }
    .input:focus{
      border-color: rgba(34,211,238,.65);
      box-shadow: 0 0 0 7px rgba(34,211,238,.14), 0 0 24px rgba(124,92,255,.12);
      transform: translateY(-1px);
    }

    .btn{
      width:100%;
      margin-top: 18px;
      padding: 14px 14px;
      border-radius: 14px;
      border: 0;
      cursor: pointer;
      font-weight: 900;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #05060b;
      background: linear-gradient(90deg, var(--neon1), var(--neon2), var(--neon3));
      box-shadow: 0 18px 50px rgba(124,92,255,.22);
      transition: transform .12s ease, filter .12s ease;
    }
    .btn:hover{ transform: translateY(-1px); filter: brightness(1.08); }
    .btn:active{ transform: translateY(0); }

    .row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-top: 10px;
      font-size: 12px;
      color: var(--muted);
      font-family: system-ui, sans-serif;
    }
    .row a{
      color: rgba(234,240,255,.9);
      text-decoration:none;
    }
    .row a:hover{ text-decoration:underline; }

    .msg{
      margin-top: 12px;
      padding: 12px;
      border-radius: 14px;
      border: 1px solid rgba(255,77,109,.45);
      background: rgba(255,77,109,.12);
      color:#ffd6de;
      font-size: 13px;
      font-family: system-ui, sans-serif;
    }
  </style>
</head>

<body>
  <div class="headlight-glow" aria-hidden="true"></div>

  <div class="card">
    <div class="badge"><span class="dot"></span> CARPOOL • NIGHT RUN</div>
    <h1>SIGN IN</h1>
    <p class="hint">Enter your username + password. Admin works too.</p>

    {% if form.errors %}
      <div class="msg">Wrong username/password. Try again.</div>
    {% endif %}

    <form method="post">
      {% csrf_token %}

      <label for="id_username">Username</label>
      <input class="input" type="text" name="username" required id="id_username" autocomplete="username" placeholder="VoidWalker403" />

      <label for="id_password">Password</label>
      <input class="input" type="password" name="password" required id="id_password" autocomplete="current-password" placeholder="••••••••" />

      <div class="row">
        <span>Quick access</span>
        <a href="/admin/">Admin</a>
      </div>

      <button class="btn" type="submit">BOOST IN</button>
      <div class="row" style="margin-top:12px">
  <span>New here?</span>
  <a href="/signup/">Create account</a>
</div>
    </form>
  </div>
</body>
</html>
