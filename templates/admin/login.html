{% extends "admin/login.html" %}
{% load static %}

{% block extrastyle %}
  {{ block.super }}
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&display=swap" rel="stylesheet">

  <style>
    body.login{
      font-family: "Orbitron", system-ui, sans-serif;
      background:
        linear-gradient(rgba(0,0,0,.70), rgba(0,0,0,.78)),
        url("{% static 'images/admin_bg.jpg' %}") !important;
      background-size: cover !important;
      background-position: center !important;
      background-repeat: no-repeat !important;
    }

    /* Center box = glass */
    .login #container{
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 18px;
      background: rgba(10,12,24,.62);
      backdrop-filter: blur(14px);
      box-shadow: 0 30px 90px rgba(0,0,0,.65);
      padding: 26px 26px 18px;
      width: min(430px, 92vw);
    }

    /* "Django administration" header */
    .login #header{
      background: transparent;
      padding: 0 0 12px;
      border-bottom: 1px solid rgba(255,255,255,.14);
      margin-bottom: 14px;
    }
    .login #header h1{
      font-size: 18px;
      letter-spacing: 1.3px;
      text-transform: uppercase;
      color: rgba(234,240,255,.92);
    }

    /* Inputs */
    .login .form-row input{
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,.16);
      background: rgba(5,6,11,.55);
      color: rgba(234,240,255,.95);
      padding: 12px 12px;
      outline: none;
    }
    .login .form-row input:focus{
      border-color: rgba(34,211,238,.65);
      box-shadow: 0 0 0 6px rgba(34,211,238,.14);
    }

    /* Login button */
    .login .submit-row input[type="submit"]{
      width: 100%;
      border: 0;
      border-radius: 12px;
      padding: 12px 14px;
      font-weight: 900;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: #05060b;
      background: linear-gradient(90deg, #7c5cff, #22d3ee, #ff2bd6);
      box-shadow: 0 18px 50px rgba(124,92,255,.22);
      cursor: pointer;
    }
    .login .submit-row input[type="submit"]:hover{
      filter: brightness(1.08);
      transform: translateY(-1px);
    }

    /* Labels */
    .login .form-row label{
      letter-spacing: 1px;
      text-transform: uppercase;
      font-size: 11px;
      color: rgba(234,240,255,.78);
    }

    /* Hide default admin blue bar */
    .login #branding, .login #site-name{
      float: none;
    }
  </style>
{% endblock %}
